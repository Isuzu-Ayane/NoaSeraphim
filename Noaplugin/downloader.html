<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>HLS(m3u8) Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f7fafc;
            padding: 40px;
            text-align: center;
        }

        .container {
            background: #fff;
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2d3748;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .video-title {
            color: #4a5568;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .progress-box {
            margin-bottom: 30px;
        }

        .progress-bar-container {
            background: #edf2f7;
            border-radius: 999px;
            height: 24px;
            overflow: hidden;
            position: relative;
            margin-bottom: 10px;
        }

        .progress-bar {
            background: #4299e1;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a202c;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
        }

        .status-text {
            color: #718096;
            font-size: 14px;
        }

        .info {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 20px;
        }

        .success-text {
            color: #38a169;
            font-weight: bold;
            display: none;
        }

        .error-text {
            color: #e53e3e;
            font-weight: bold;
            display: none;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>動画のダウンロードと結合</h1>
        <div class="video-title" id="videoTitle">動画タイトル...</div>

        <div class="progress-box">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            <div class="status-text" id="statusText">プレイリストを解析中...</div>
        </div>

        <div class="success-text" id="successText">ダウンロードが完了し、ファイルとして保存されました！このタブは閉じても構いません。</div>
        <div class="error-text" id="errorText"></div>

        <div class="info">※このページは全ての結合処理が完了して保存ダイアログが出るまで<b>閉じない</b>でください</div>
    </div>
    <script src="downloader.js"></script>
</body>

</html>
